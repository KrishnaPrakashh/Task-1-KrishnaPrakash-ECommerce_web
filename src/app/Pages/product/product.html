<div *ngIf="loading" class="text-center my-5">
  <div class="spinner-border text-primary" role="status"></div>
  <p class="mt-3">Loading Products...</p>
</div>
<div class="container my-4">
  <input
    type="text"
    class="form-control"
    placeholder="Search products..."
    [(ngModel)]="searchText">
</div>

<div class="card-container">
  @for (item of filteredProducts; track item.id) {
    <div class="card">
      <img [src]="item.thumbnail" [alt]="item.name" class="product-img" />

      <h3>{{ item.title }}</h3>
      <h4>{{ item.category }}</h4>
      <p class="price">Price: Rs {{ (item.price * 83)| number:'1.0-0' }}</p>

      <a [routerLink]="['/singleview',item.id]" class="btn">View Details</a>
    </div>
  }
</div>
